
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f13;--surface:#17171e;--card:#1e1e28;--border:#2e2e3e;
    --accent:#a78bfa;--accent2:#7c3aed;--green:#4ade80;--amber:#fbbf24;--red:#f87171;
    --text:#f1f0fa;--muted:#9590b0;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--serif:'Playfair Display',serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:0}
  .header{padding:2rem 2rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
  .header h1{font-family:var(--serif);font-size:1.8rem;font-weight:700;color:var(--text)}
  .header-stats{display:flex;gap:1rem;flex-wrap:wrap}
  .hstat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.5rem 1rem;text-align:center}
  .hstat .val{font-family:var(--mono);font-size:1.2rem;font-weight:500;color:var(--accent)}
  .hstat .lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .tabs{display:flex;gap:.5rem;padding:1rem 2rem;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:.5rem 1.1rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.85rem;cursor:pointer;white-space:nowrap;transition:.15s;font-family:var(--sans)}
  .tab:hover{color:var(--text);border-color:var(--accent)}
  .tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .main{padding:1.5rem 2rem;max-width:900px}
  .subject-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem}
  .subject-name{font-family:var(--serif);font-size:1.4rem;font-weight:500}
  .progress-ring-wrap{display:flex;align-items:center;gap:.75rem}
  .progress-bar-outer{background:var(--border);border-radius:99px;height:8px;width:180px;overflow:hidden}
  .progress-bar-inner{height:8px;border-radius:99px;transition:.4s;background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .pct-label{font-family:var(--mono);font-size:.85rem;font-weight:500;color:var(--accent);min-width:38px}
  .actions{display:flex;gap:.5rem;flex-wrap:wrap}
  .btn{padding:.45rem .9rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.8rem;cursor:pointer;font-family:var(--sans);transition:.15s}
  .btn:hover{color:var(--text);border-color:var(--accent)}
  .btn.primary{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .btn.primary:hover{background:var(--accent)}
  .btn.danger{color:var(--red);border-color:#3e1e1e}
  .btn.danger:hover{background:#3e1e1e;border-color:var(--red)}
  .topic-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem}
  .topic-row{display:flex;align-items:center;gap:.75rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;transition:.15s}
  .topic-row:hover{border-color:#3d3d55}
  .topic-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
  .topic-check.done{background:var(--accent2);border-color:var(--accent2)}
  .topic-check.done::after{content:'';display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
  .topic-text{flex:1;font-size:.9rem;color:var(--text)}
  .topic-text.done{text-decoration:line-through;color:var(--muted)}
  .topic-status{font-size:.7rem;font-family:var(--mono);padding:.2rem .55rem;border-radius:5px;flex-shrink:0}
  .status-done{background:#1a2e1a;color:var(--green)}
  .status-pending{background:#1e1a2e;color:#9b7ff5}
  .topic-del{background:none;border:none;color:#3e2e3e;cursor:pointer;font-size:1rem;padding:0 .2rem;transition:.15s;line-height:1}
  .topic-del:hover{color:var(--red)}
  .add-topic-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
  .input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.55rem .9rem;color:var(--text);font-size:.9rem;font-family:var(--sans);outline:none;transition:.15s}
  .input:focus{border-color:var(--accent)}
  .topic-input{flex:1;min-width:180px}
  .overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem;margin-top:.5rem}
  .ov-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .ov-card:hover{border-color:var(--accent);transform:translateY(-1px)}
  .ov-card-bar{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:.4s}
  .ov-card-name{font-family:var(--serif);font-size:1rem;margin-bottom:.4rem}
  .ov-card-stats{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted)}
  .ov-pct{font-family:var(--mono);font-size:1.4rem;font-weight:500;margin:.3rem 0}
  .deadline-row{display:flex;align-items:center;gap:.5rem;margin-top:.6rem}
  .deadline-badge{font-size:.7rem;font-family:var(--mono);padding:.2rem .55rem;border-radius:5px}
  .dl-ok{background:#1a2e1a;color:var(--green)}
  .dl-warn{background:#2e2a1a;color:var(--amber)}
  .dl-late{background:#2e1a1a;color:var(--red)}
  .section-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.8rem;font-family:var(--mono)}
  .empty{color:var(--muted);font-size:.85rem;padding:.8rem 0;text-align:center}
  .notes-area{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;color:var(--text);font-size:.85rem;font-family:var(--mono);width:100%;min-height:80px;outline:none;resize:vertical;margin-bottom:1rem;line-height:1.6}
  .notes-area:focus{border-color:var(--accent)}
  .divider{border:none;border-top:1px solid var(--border);margin:1.2rem 0}
  .tag-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
  .tag{font-size:.7rem;padding:.2rem .55rem;border-radius:5px;font-family:var(--mono);background:#1e1a2e;color:#9b7ff5;border:1px solid #2d2040;cursor:pointer}
  .tag.active-tag{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;width:100%;max-width:420px}
  .modal h2{font-family:var(--serif);font-size:1.2rem;margin-bottom:1rem}
  .modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.2rem}
  .label{font-size:.75rem;color:var(--muted);margin-bottom:.35rem;display:block}
  .mb{margin-bottom:.9rem}
  select.input option{background:var(--surface);color:var(--text)}
  .confetti{position:fixed;top:0;left:0;pointer-events:none;z-index:999;width:100vw;height:100vh}
  @media(max-width:600px){.main{padding:1rem};.header{padding:1rem}}
</style>
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Syllabus tracker — manage and track completion of 6 subjects</h2>

<div id="app"></div>
<canvas class="confetti" id="confetti-canvas"></canvas>

<script>
const SUBJECTS = ['Subject 1','Subject 2','Subject 3','Subject 4','Subject 5','Subject 6'];
const PRIORITY = ['low','medium','high'];
const PRIOCOLOR = {low:'#1e2e1e',medium:'#2e2a1a',high:'#2e1a1a'};
const PRIOTC = {low:'#4ade80',medium:'#fbbf24',high:'#f87171'};

function load(){
  try{return JSON.parse(localStorage.getItem('syllabusData')||'null')}catch{return null}
}
function save(d){try{localStorage.setItem('syllabusData',JSON.stringify(d))}catch{}}

let data = load() || SUBJECTS.map((name,i)=>({
  id:i,name,topics:[],notes:'',deadline:'',showDeadline:false
}));

let view='overview', activeSubject=0, filter='all', showAddTopic=false, showModal=false, modalType='', editingSubjectIdx=null;

function pct(sub){
  if(!sub.topics.length) return 0;
  return Math.round(sub.topics.filter(t=>t.done).length/sub.topics.length*100);
}
function daysLeft(dl){
  if(!dl) return null;
  const diff=Math.ceil((new Date(dl)-new Date())/(1000*60*60*24));
  return diff;
}
function dlClass(dl){
  const d=daysLeft(dl);
  if(d===null) return '';
  if(d<0) return 'dl-late';
  if(d<=3) return 'dl-warn';
  return 'dl-ok';
}
function dlLabel(dl){
  const d=daysLeft(dl);
  if(d===null) return '';
  if(d<0) return `${Math.abs(d)}d overdue`;
  if(d===0) return 'due today';
  if(d===1) return '1 day left';
  return `${d} days left`;
}

function totalTopics(){return data.reduce((a,s)=>a+s.topics.length,0)}
function totalDone(){return data.reduce((a,s)=>a+s.topics.filter(t=>t.done).length,0)}
function overallPct(){const t=totalTopics();return t?Math.round(totalDone()/t*100):0}

function render(){
  document.getElementById('app').innerHTML = buildApp();
  attachEvents();
}

function buildApp(){
  return `
    <div class="header">
      <div>
        <h1>Study Planner</h1>
        <div style="font-size:.78rem;color:var(--muted);margin-top:.25rem;font-family:var(--mono)">${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})}</div>
      </div>
      <div class="header-stats">
        <div class="hstat"><div class="val">${overallPct()}%</div><div class="lbl">overall</div></div>
        <div class="hstat"><div class="val">${totalDone()}/${totalTopics()}</div><div class="lbl">topics done</div></div>
        <div class="hstat"><div class="val">${data.filter(s=>pct(s)===100&&s.topics.length>0).length}/6</div><div class="lbl">subjects done</div></div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab${view==='overview'?' active':''}" data-view="overview">Overview</div>
      ${data.map((s,i)=>`<div class="tab${view==='subject'&&activeSubject===i?' active':''}" data-view="subject" data-idx="${i}">${s.name}</div>`).join('')}
    </div>
    <div class="main">
      ${view==='overview'?buildOverview():buildSubject(data[activeSubject],activeSubject)}
    </div>
    ${showModal?buildModal():''}
  `;
}

function buildOverview(){
  return `
    <div class="section-title">all subjects</div>
    <div class="overview-grid">
      ${data.map((s,i)=>`
        <div class="ov-card" data-goto="${i}">
          <div class="ov-card-bar" style="width:${pct(s)}%"></div>
          <div class="ov-card-name">${s.name}</div>
          <div class="ov-pct" style="color:${pct(s)===100?'var(--green)':pct(s)>50?'var(--accent)':'var(--muted)'}">${pct(s)}%</div>
          <div class="ov-card-stats">
            <span>${s.topics.filter(t=>t.done).length}/${s.topics.length} topics</span>
            <span style="color:${pct(s)===100?'var(--green)':'var(--muted)'}">${pct(s)===100?'complete':pct(s)>0?'in progress':'not started'}</span>
          </div>
          ${s.deadline?`<div class="deadline-row"><span class="deadline-badge ${dlClass(s.deadline)}">${dlLabel(s.deadline)}</span></div>`:''}
        </div>
      `).join('')}
    </div>
    ${buildOverviewProgress()}
  `;
}

function buildOverviewProgress(){
  return `
    <hr class="divider">
    <div class="section-title">overall progress</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem">
        <span style="font-family:var(--mono);font-size:.85rem;color:var(--muted)">completion</span>
        <span style="font-family:var(--mono);font-size:.9rem;color:var(--accent)">${overallPct()}%</span>
      </div>
      <div style="background:var(--border);border-radius:99px;height:10px;overflow:hidden">
        <div style="height:10px;width:${overallPct()}%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:99px;transition:.4s"></div>
      </div>
      ${data.map(s=>`
        <div style="display:flex;align-items:center;gap:.7rem;margin-top:.7rem">
          <span style="font-size:.75rem;color:var(--muted);width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span>
          <div style="flex:1;background:var(--border);border-radius:99px;height:5px;overflow:hidden">
            <div style="height:5px;width:${pct(s)}%;background:${pct(s)===100?'var(--green)':'var(--accent)'};border-radius:99px;transition:.4s"></div>
          </div>
          <span style="font-family:var(--mono);font-size:.75rem;color:var(--muted);min-width:32px;text-align:right">${pct(s)}%</span>
        </div>
      `).join('')}
    </div>
  `;
}

function buildSubject(s,idx){
  const filtered = s.topics.filter(t=>{
    if(filter==='done') return t.done;
    if(filter==='pending') return !t.done;
    return true;
  });
  return `
    <div class="subject-header">
      <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
        <div class="subject-name">${s.name}</div>
        <button class="btn" data-action="rename" data-idx="${idx}" style="font-size:.75rem">rename</button>
      </div>
      <div class="progress-ring-wrap">
        <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct(s)}%"></div></div>
        <span class="pct-label">${pct(s)}%</span>
        ${s.deadline?`<span class="deadline-badge ${dlClass(s.deadline)}">${dlLabel(s.deadline)}</span>`:''}
      </div>
    </div>
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem">
      <button class="btn" data-action="setdeadline" data-idx="${idx}">${s.deadline?'edit deadline':'set deadline'}</button>
      ${s.deadline?`<button class="btn danger" data-action="cleardeadline" data-idx="${idx}">remove deadline</button>`:''}
      <button class="btn primary" data-action="markall" data-idx="${idx}">mark all done</button>
      <button class="btn" data-action="clearall" data-idx="${idx}">reset all</button>
    </div>
    <div class="section-title">notes</div>
    <textarea class="notes-area" placeholder="Add notes, important formulas, resources..." data-notes="${idx}">${s.notes||''}</textarea>
    <hr class="divider">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:.8rem">
      <div class="section-title" style="margin:0">topics (${s.topics.filter(t=>t.done).length}/${s.topics.length})</div>
      <div class="tag-row" style="margin:0">
        <div class="tag${filter==='all'?' active-tag':''}" data-filter="all">all</div>
        <div class="tag${filter==='pending'?' active-tag':''}" data-filter="pending">pending</div>
        <div class="tag${filter==='done'?' active-tag':''}" data-filter="done">done</div>
      </div>
    </div>
    <div class="topic-list">
      ${filtered.length?filtered.map(t=>`
        <div class="topic-row">
          <div class="topic-check${t.done?' done':''}" data-toggle="${t.id}" data-idx="${idx}"></div>
          <span class="topic-text${t.done?' done':''}">${escHtml(t.text)}</span>
          ${t.priority?`<span style="font-size:.7rem;padding:.2rem .5rem;border-radius:5px;font-family:var(--mono);background:${PRIOCOLOR[t.priority]};color:${PRIOTC[t.priority]}">${t.priority}</span>`:''}
          <span class="topic-status ${t.done?'status-done':'status-pending'}">${t.done?'done':'pending'}</span>
          <button class="topic-del" data-del="${t.id}" data-idx="${idx}">×</button>
        </div>
      `):'<div class="empty">no topics here</div>'}
    </div>
    <div style="margin-top:.5rem">
      <div class="add-topic-row">
        <input class="input topic-input" id="topic-input-${idx}" placeholder="Add a topic (e.g. Linked Lists, Chapter 3...)" />
        <select class="input" id="prio-select-${idx}" style="width:110px">
          <option value="">priority</option>
          ${PRIORITY.map(p=>`<option value="${p}">${p}</option>`).join('')}
        </select>
        <button class="btn primary" data-action="addtopic" data-idx="${idx}">+ add</button>
      </div>
    </div>
  `;
}

function buildModal(){
  if(modalType==='rename'){
    const s=data[editingSubjectIdx];
    return `<div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h2>rename subject</h2>
        <div class="mb"><label class="label">subject name</label><input class="input" id="rename-input" value="${escHtml(s.name)}" style="width:100%"></div>
        <div class="modal-actions">
          <button class="btn" id="modal-cancel">cancel</button>
          <button class="btn primary" id="modal-confirm">save</button>
        </div>
      </div>
    </div>`;
  }
  if(modalType==='deadline'){
    const s=data[editingSubjectIdx];
    return `<div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h2>set deadline</h2>
        <div class="mb"><label class="label">exam / deadline date</label><input class="input" id="deadline-input" type="date" value="${s.deadline||''}" style="width:100%"></div>
        <div class="modal-actions">
          <button class="btn" id="modal-cancel">cancel</button>
          <button class="btn primary" id="modal-confirm">save</button>
        </div>
      </div>
    </div>`;
  }
  return '';
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let topicIdCounter = data.reduce((max,s)=>Math.max(max,...s.topics.map(t=>t.id||0),0),0)+1;

function attachEvents(){
  document.querySelectorAll('.tab').forEach(el=>{
    el.addEventListener('click',()=>{
      const v=el.dataset.view;
      if(v==='overview'){view='overview';}
      else{view='subject';activeSubject=parseInt(el.dataset.idx);}
      render();
    });
  });
  document.querySelectorAll('.ov-card[data-goto]').forEach(el=>{
    el.addEventListener('click',()=>{view='subject';activeSubject=parseInt(el.dataset.goto);render();});
  });
  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx=parseInt(el.dataset.idx);
      const id=parseInt(el.dataset.toggle);
      const t=data[idx].topics.find(t=>t.id===id);
      if(t){t.done=!t.done;save(data);render();if(t.done&&data[idx].topics.every(t=>t.done)&&data[idx].topics.length>0)celebrate();}
    });
  });
  document.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx=parseInt(el.dataset.idx);
      const id=parseInt(el.dataset.del);
      data[idx].topics=data[idx].topics.filter(t=>t.id!==id);
      save(data);render();
    });
  });
  document.querySelectorAll('[data-filter]').forEach(el=>{
    el.addEventListener('click',()=>{filter=el.dataset.filter;render();});
  });
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click',()=>{
      const a=el.dataset.action, idx=parseInt(el.dataset.idx);
      if(a==='addtopic'){
        const inp=document.getElementById(`topic-input-${idx}`);
        const prio=document.getElementById(`prio-select-${idx}`);
        const txt=inp?.value.trim();
        if(txt){
          data[idx].topics.push({id:topicIdCounter++,text:txt,done:false,priority:prio?.value||''});
          save(data);render();
        }
      }else if(a==='rename'){editingSubjectIdx=idx;modalType='rename';showModal=true;render();}
      else if(a==='setdeadline'){editingSubjectIdx=idx;modalType='deadline';showModal=true;render();}
      else if(a==='cleardeadline'){data[idx].deadline='';save(data);render();}
      else if(a==='markall'){data[idx].topics.forEach(t=>t.done=true);save(data);render();}
      else if(a==='clearall'){data[idx].topics.forEach(t=>t.done=false);save(data);render();}
    });
  });
  document.querySelectorAll('[data-notes]').forEach(el=>{
    el.addEventListener('input',()=>{data[parseInt(el.dataset.notes)].notes=el.value;save(data);});
  });
  const overlay=document.getElementById('modal-overlay');
  if(overlay){
    overlay.addEventListener('click',e=>{if(e.target===overlay){showModal=false;render();}});
    document.getElementById('modal-cancel')?.addEventListener('click',()=>{showModal=false;render();});
    document.getElementById('modal-confirm')?.addEventListener('click',()=>{
      if(modalType==='rename'){
        const v=document.getElementById('rename-input')?.value.trim();
        if(v)data[editingSubjectIdx].name=v;
      }else if(modalType==='deadline'){
        const v=document.getElementById('deadline-input')?.value;
        data[editingSubjectIdx].deadline=v||'';
      }
      showModal=false;save(data);render();
    });
  }
  document.querySelectorAll('.topic-input').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){const idx=parseInt(inp.id.split('-').pop());const btn=document.querySelector(`[data-action="addtopic"][data-idx="${idx}"]`);btn?.click();}
    });
  });
}

function celebrate(){
  const canvas=document.getElementById('confetti-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pts=Array.from({length:60},()=>({x:Math.random()*canvas.width,y:-10,vx:(Math.random()-.5)*4,vy:Math.random()*4+2,r:Math.random()*6+3,c:['#a78bfa','#4ade80','#fbbf24','#f87171','#7c3aed'][Math.floor(Math.random()*5)],rot:Math.random()*360}));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=3;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore();});
    frame++;
    if(frame<90)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

render();
</script>
